<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Certificate Roast AI 🔥</title>
  <meta charset="UTF-8"/>
  <link rel="stylesheet" th:href="@{/css/roast.css}">
  <script>
    function toggleInput(mode) {
      document.getElementById("fileInput").style.display =
          mode === "file" ? "block" : "none";
      document.getElementById("pemInput").style.display =
          mode === "pem" ? "block" : "none";
    }
  </script>
</head>
<body>

<div class="container">

  <h2>🔥 Certificate Roast AI</h2>

  <form method="post" enctype="multipart/form-data" th:action="@{/roast}">

    <label>인증서 타입</label>
    <select name="type" required>
      <option value="root">Root CA</option>
      <option value="sub">Sub CA</option>
      <option value="leaf">Leaf</option>
    </select>

    <label>입력 방식</label>
    <div class="toggle-group">
      <button type="button" onclick="toggleInput('file')">파일 업로드</button>
      <button type="button" onclick="toggleInput('pem')">PEM 직접 입력</button>
    </div>

    <input type="hidden" name="inputMode" id="inputMode" value="file"/>

    <div id="fileInput">
      <label>인증서 파일 (PEM or DER)</label>
      <input type="file" name="file"/>
    </div>

    <div id="pemInput" style="display:none;">
      <label>PEM 텍스트</label>
      <textarea name="pemText" rows="12"
                placeholder="-----BEGIN CERTIFICATE-----"></textarea>
    </div>

    <button type="submit" class="roast-btn">Roast 🔥</button>
  </form>

  <div class="result" th:if="${result != null}">
    <h3 th:text="'점수: ' + ${result.score} + ' / 10'"></h3>
    <p th:text="${result.comment}"></p>
  </div>

</div>

<script>
  document.querySelectorAll(".toggle-group button")
  .forEach(btn => {
    btn.addEventListener("click", e => {
      const mode = e.target.innerText.includes("파일") ? "file" : "pem";
      document.getElementById("inputMode").value = mode;
      toggleInput(mode);
    });
  });
</script>

</body>
</html>
